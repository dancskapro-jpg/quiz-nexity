<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz – Locaux Commerciaux</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E2001A;
    --dark: #1a1a1a;
    --white: #ffffff;
    --light: #f5f5f5;
    --grey: #888;
    --correct: #22c55e;
    --wrong: #ef4444;
    --accent: #8B0000;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--dark);
    color: var(--white);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--red);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .header-sub { font-size: 13px; opacity: 0.85; }

  /* PROGRESS */
  .progress-bar-wrap {
    background: #333;
    height: 5px;
  }
  .progress-bar-fill {
    height: 5px;
    background: var(--red);
    transition: width 0.4s ease;
  }

  /* SCREENS */
  .screen { display: none; }
  .screen.active { display: block; }

  /* IDENTITY SCREEN */
  .identity-wrap {
    max-width: 480px;
    margin: 80px auto;
    padding: 40px;
    background: #242424;
    border: 1px solid #333;
    border-radius: 4px;
    text-align: center;
  }
  .identity-wrap h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .identity-wrap p { color: #aaa; margin-bottom: 28px; font-size: 15px; }
  .identity-wrap input {
    width: 100%;
    padding: 13px 16px;
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 3px;
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    margin-bottom: 14px;
    outline: none;
    transition: border 0.2s;
  }
  .identity-wrap input:focus { border-color: var(--red); }
  .btn-start {
    width: 100%;
    padding: 14px;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 3px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 4px;
  }
  .btn-start:hover { background: #b5001a; }

  /* QUIZ SCREEN */
  .quiz-wrap {
    max-width: 700px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  .q-counter {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .q-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px;
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .q-sub {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 24px;
    line-height: 1.5;
  }

  /* OPTIONS GRID */
  .options-grid {
    display: grid;
    gap: 10px;
  }

  .option-btn {
    padding: 13px 18px;
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: 3px;
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 12px;
    user-select: none;
  }
  .option-btn:hover:not(.locked) {
    border-color: var(--red);
    background: #2f2020;
  }
  .option-btn.selected {
    border-color: var(--red);
    background: rgba(226,0,26,0.15);
  }
  .option-btn.correct {
    border-color: var(--correct);
    background: rgba(34,197,94,0.15);
    color: #86efac;
  }
  .option-btn.wrong {
    border-color: var(--wrong);
    background: rgba(239,68,68,0.1);
    color: #fca5a5;
  }
  .option-btn.locked { cursor: default; }
  .option-letter {
    width: 26px;
    height: 26px;
    background: #3a3a3a;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 12px;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .option-btn.selected .option-letter { background: var(--red); }
  .option-btn.correct .option-letter { background: var(--correct); color: #000; }
  .option-btn.wrong .option-letter { background: var(--wrong); color: #000; }

  /* MULTI SELECT INFO */
  .multi-info {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 14px;
    padding: 8px 12px;
    background: #2a2a2a;
    border-left: 3px solid var(--red);
    border-radius: 2px;
  }

  /* DRAG DROP */
  .drag-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  .drag-pool {
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: 3px;
    padding: 12px;
    min-height: 120px;
  }
  .drag-pool-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--grey);
    margin-bottom: 10px;
    font-weight: 600;
  }
  .drag-item {
    padding: 9px 13px;
    background: #1a1a1a;
    border: 1px solid #3a3a3a;
    border-radius: 3px;
    font-size: 13px;
    cursor: grab;
    margin-bottom: 7px;
    transition: all 0.15s;
    user-select: none;
  }
  .drag-item:hover { border-color: var(--red); background: #2f2020; }
  .drag-item.dragging { opacity: 0.4; }
  .drag-pool.drag-over { border-color: var(--red); background: #2f2020; }
  .drag-pool.correct-pool { border-color: var(--correct); }
  .drag-pool.wrong-pool { border-color: var(--wrong); }

  /* FEEDBACK */
  .feedback-box {
    margin-top: 16px;
    padding: 14px 16px;
    background: #1e1e1e;
    border-left: 4px solid var(--correct);
    border-radius: 2px;
    font-size: 13.5px;
    line-height: 1.6;
    color: #ccc;
    display: none;
  }
  .feedback-box.show { display: block; }
  .feedback-box.error { border-left-color: var(--wrong); }
  .feedback-title { font-weight: 700; color: var(--white); margin-bottom: 4px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* SCORE BADGE */
  .score-badge {
    display: inline-block;
    padding: 4px 10px;
    background: rgba(226,0,26,0.15);
    border: 1px solid var(--red);
    border-radius: 2px;
    font-size: 13px;
    color: var(--red);
    font-weight: 600;
    margin-bottom: 24px;
  }

  /* BUTTONS */
  .btn-validate {
    margin-top: 20px;
    padding: 13px 32px;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 3px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-validate:hover { background: #b5001a; }
  .btn-validate:disabled { background: #444; cursor: default; }

  .btn-next {
    margin-top: 16px;
    padding: 13px 32px;
    background: transparent;
    color: var(--white);
    border: 1px solid #555;
    border-radius: 3px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
    margin-left: 12px;
  }
  .btn-next.show { display: inline-block; }
  .btn-next:hover { border-color: var(--red); color: var(--red); }

  /* RESULTS */
  .results-wrap {
    max-width: 600px;
    margin: 60px auto;
    padding: 24px;
    text-align: center;
  }
  .results-wrap h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 40px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .results-wrap .sub { color: #aaa; font-size: 15px; margin-bottom: 32px; }

  .score-ring-wrap { position: relative; display: inline-block; margin-bottom: 28px; }
  .score-ring-wrap svg { transform: rotate(-90deg); }
  .score-ring-wrap .ring-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
  }
  .ring-pct { font-size: 46px; font-weight: 900; color: var(--white); line-height: 1; }
  .ring-label { font-size: 13px; color: #aaa; letter-spacing: 1px; text-transform: uppercase; }

  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }
  .result-card {
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: 3px;
    padding: 16px;
  }
  .result-card .val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--red);
  }
  .result-card .lbl { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

  .result-message {
    font-size: 16px;
    color: #ccc;
    margin-bottom: 28px;
    line-height: 1.6;
    background: #2a2a2a;
    padding: 16px;
    border-radius: 3px;
    border-left: 4px solid var(--red);
  }

  .send-status {
    margin-top: 16px;
    font-size: 13px;
    color: #aaa;
    padding: 10px;
    background: #2a2a2a;
    border-radius: 3px;
  }
  .send-status.ok { color: var(--correct); border-left: 3px solid var(--correct); }
  .send-status.err { color: var(--wrong); border-left: 3px solid var(--wrong); }

  /* REVIEW LIST */
  .review-list { text-align: left; margin-top: 32px; }
  .review-item {
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: 3px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .review-item .r-q { font-size: 13px; color: #aaa; margin-bottom: 6px; }
  .review-item .r-answer { font-size: 14px; }
  .review-item .r-answer.ok { color: var(--correct); }
  .review-item .r-answer.ko { color: var(--wrong); }
  .review-item .r-correct { font-size: 12px; color: #aaa; margin-top: 4px; }

  @media(max-width:600px){
    .q-text { font-size: 20px; }
    .drag-container { grid-template-columns: 1fr; }
    .results-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- PROGRESS BAR -->
<div class="header">
  <div>
    <div class="header-title">Quiz – Locaux Commerciaux</div>
    <div class="header-sub">Formation Vendeurs Logement · 13 Mars 2026</div>
  </div>
  <div id="score-live" class="score-badge" style="display:none">0 / 0</div>
</div>
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>

<!-- IDENTITY -->
<div id="screen-identity" class="screen active">
  <div class="identity-wrap">
    <h2>Prêt à tester vos connaissances ?</h2>
    <p>Entrez vos informations avant de commencer</p>
    <input type="text" id="inp-prenom" placeholder="Prénom" />
    <input type="text" id="inp-nom" placeholder="Nom" />
    <button class="btn-start" onclick="startQuiz()">Commencer le quiz →</button>
  </div>
</div>

<!-- QUIZ -->
<div id="screen-quiz" class="screen">
  <div class="quiz-wrap">
    <div id="q-counter" class="q-counter"></div>
    <div id="q-text" class="q-text"></div>
    <div id="q-sub" class="q-sub"></div>
    <div id="multi-info" class="multi-info" style="display:none"></div>
    <div id="options-area"></div>
    <div id="feedback-box" class="feedback-box"></div>
    <div style="margin-top:20px">
      <button class="btn-validate" id="btn-validate" onclick="validate()" disabled>Valider</button>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">Question suivante →</button>
    </div>
  </div>
</div>

<!-- RESULTS -->
<div id="screen-results" class="screen">
  <div class="results-wrap">
    <h2>Résultats</h2>
    <div class="sub" id="res-name"></div>
    <div class="score-ring-wrap">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="68" fill="none" stroke="#333" stroke-width="12"/>
        <circle id="ring-circle" cx="80" cy="80" r="68" fill="none" stroke="#E2001A" stroke-width="12"
          stroke-dasharray="427" stroke-dashoffset="427" stroke-linecap="round"
          style="transition: stroke-dashoffset 1.2s ease"/>
      </svg>
      <div class="ring-text">
        <div class="ring-pct" id="ring-pct">0%</div>
        <div class="ring-label">Score</div>
      </div>
    </div>
    <div class="results-grid">
      <div class="result-card"><div class="val" id="res-correct">0</div><div class="lbl">Bonnes réponses</div></div>
      <div class="result-card"><div class="val" id="res-total">0</div><div class="lbl">Questions QCM</div></div>
      <div class="result-card"><div class="val" id="res-pct">0%</div><div class="lbl">Réussite</div></div>
    </div>
    <div class="result-message" id="res-message"></div>
    <div id="send-status" class="send-status">📤 Envoi des résultats en cours…</div>
    <div class="review-list" id="review-list"></div>
  </div>
</div>

<script>
// =====================
// DATA
// =====================
const WEBHOOK = "https://script.google.com/macros/s/AKfycbw219Z6GlNlEwcjxZszZ9-bG1VrUsyK5uNevc3ADdjSn68pmrukURbF7TzolGCV0Ca1/exec";

let prenom = "", nom = "";
let currentQ = 0;
let scoreCorrect = 0;
let scoreTotal = 0; // QCM uniquement
let participantAnswers = {};

// =====================
// QUESTIONS (10)
// =====================
const questions = [

  // Q1 — Multi (4 parmi 10) — Acteurs principaux
  {
    id: 1,
    type: "multi",
    required: 4,
    text: "Qui sont les acteurs principaux du marché des locaux commerciaux ?",
    sub: "Sélectionnez exactement 4 réponses parmi les 10 propositions.",
    options: [
      "Notaires",
      "Investisseurs",
      "CGP",
      "Gestionnaires",
      "Courtiers",
      "Brokers",
      "Banques",
      "Architectes",
      "Exploitants",
      "Assureurs"
    ],
    correct: [1, 3, 5, 8],
    feedback: {
      ok: "Bravo ! Les 4 acteurs clés sont : Exploitants, Investisseurs, Brokers et Gestionnaires.",
      ko: "Les 4 acteurs majeurs du marché sont : Exploitants, Investisseurs (propriétaires des murs), Brokers spécialisés et Gestionnaires (gestion locative, property management). Notaires, CGP, banques et courtiers sont des intermédiaires, pas des acteurs du marché des locaux commerciaux."
    }
  },

  // Q2 — Multi — Secteurs en développement
  {
    id: 2,
    type: "multi",
    required: 4,
    text: "Quels sont les secteurs en développement pour les locaux commerciaux en pied d'immeuble ?",
    sub: "Sélectionnez 4 réponses.",
    options: [
      "Grande distribution",
      "Restauration",
      "Tourisme & hôtellerie",
      "Sport",
      "Automobile",
      "Santé",
      "Centres commerciaux régionaux",
      "Commerce de proximité"
    ],
    correct: [1, 3, 5, 7],
    feedback: {
      ok: "Exact ! Restauration, Sport, Santé et Commerce de proximité sont les 4 secteurs en fort développement.",
      ko: "Les secteurs en développement : Santé (attention agrément ARS parfois requis), Restauration (attention risque de bulle), Sport (en structuration : Gigafit, Basic Fit…) et Commerce de proximité (boulangerie, opticien, alimentaire…)."
    }
  },

  // Q3 — QCM multi — Avantage local neuf
  {
    id: 3,
    type: "qcm-multi",
    required: 3,
    text: "Quels sont les avantages d'un local commercial neuf en VEFA ?",
    sub: "3 bonnes réponses parmi les propositions.",
    options: [
      "Exploitation immédiate possible",
      "Garanties du neuf (décennale, biennale…)",
      "Prix souvent plus élevé car actif stabilisé",
      "Forte personnalisation possible selon l'activité",
      "Taux de fréquentation du lieu connu",
      "Potentiel de plus-value plus important"
    ],
    correct: [1, 3, 5],
    feedback: {
      ok: "Parfait ! Garanties du neuf, personnalisation libre et potentiel de plus-value sont les 3 vrais avantages.",
      ko: "Les 3 avantages du neuf : personnalisation totale de l'aménagement, potentiel de plus-value à la livraison, et garanties constructeur (décennale, biennale, parfait achèvement). L'exploitation immédiate et le taux de fréquentation connu sont des atouts de l'ancien, pas du neuf."
    }
  },

  // Q4 — Multi — Pondération locative
  {
    id: 4,
    type: "multi",
    required: 4,
    text: "De quoi tient compte la notion de pondération locative ?",
    sub: "Sélectionnez 4 éléments pris en compte dans la pondération.",
    options: [
      "Âge du vendeur",
      "Profondeur du local",
      "Montant de l'apport de l'acquéreur",
      "Rez-de-chaussée ou étage",
      "Couleur de la façade",
      "Largeur de vitrine",
      "Nombre de fenêtres",
      "Annexes et terrasses reliées"
    ],
    correct: [1, 3, 5, 7],
    feedback: {
      ok: "Correct ! La pondération tient compte de la profondeur, l'étage, la vitrine et les annexes.",
      ko: "La pondération locative s'applique selon : l'étage (R+1/R-1 = 40%), la profondeur (3e zone = 40-60%), la largeur de vitrine (angle = 110-130%) et les annexes (10-40%). L'âge du vendeur ou le montant de l'apport n'ont aucun rapport."
    }
  },

  // Q5 — QCM — PUM Nexity
  {
    id: 5,
    type: "qcm",
    text: "Quel est le Prix Unitaire Moyen d'un local commercial Nexity (à 50 000 € près) ?",
    sub: "",
    options: ["330 000 €", "480 000 €", "260 000 €", "430 000 €"],
    correct: 3,
    feedback: {
      ok: "Exact ! Le PUM est de 429 000 €, soit environ 430 000 €.",
      ko: "Le PUM est de 429 000 €. Nexity dispose de 72 lots en stock pour un CA potentiel de 30,9 M€."
    }
  },

  // Q6 — Multi — Sources d'acquéreurs
  {
    id: 6,
    type: "multi",
    required: 3,
    text: "Quelles sont les principales sources d'acquéreurs pour un local commercial ?",
    sub: "Sélectionnez 3 bonnes réponses.",
    options: [
      "Petites annonces en vitrine",
      "Actions terrain (notaires, mairies, franchises…)",
      "Bouche à oreille uniquement",
      "Nos fichiers investisseurs",
      "Réseaux sociaux grand public uniquement",
      "Les intermédiaires (agents, brokers, réseaux bancaires)"
    ],
    correct: [1, 3, 5],
    feedback: {
      ok: "Bravo ! Fichiers investisseurs, intermédiaires et actions terrain sont les 3 bonnes sources.",
      ko: "Les 3 sources : nos fichiers investisseurs internes (campagne prévue en avril), les intermédiaires partenaires (brokers, agents, banques) et les actions terrain (notaires, mairies, réseaux de franchise, exploitants locaux)."
    }
  },

  // Q7 — Arguments de vente — Multi
  {
    id: 7,
    type: "multi",
    required: 4,
    text: "Quels sont les arguments clés à mettre en avant pour vendre un local commercial ?",
    sub: "Sélectionnez 4 bons arguments.",
    options: [
      "Couleur des murs du local",
      "Emplacement et qualité du quartier",
      "Surface de la cave",
      "Rendement locatif attractif",
      "Nombre d'étages de l'immeuble",
      "Flux piétons et accessibilité",
      "Marque du promoteur uniquement",
      "Visibilité du local"
    ],
    correct: [1, 3, 5, 7],
    feedback: {
      ok: "Parfait ! Emplacement, rendement, flux et visibilité sont les 4 arguments clés.",
      ko: "Les arguments qui font vendre : emplacement (critère n°1), rendement locatif (>7% chez Nexity), flux (piéton, voiture, chalandise) et visibilité (angle, vitrine). Le reste est anecdotique."
    }
  },

  // Q8 — Drag & drop — Profil investisseur
  {
    id: 8,
    type: "drag",
    text: "Faites correspondre chaque description au bon profil investisseur",
    sub: "Glissez-déposez les éléments dans la bonne colonne.",
    pools: [
      { label: "Profil Rendement", id: "pool-rendement" },
      { label: "Profil Patrimonial Sécurisé", id: "pool-patrimonial" }
    ],
    items: [
      { id: "d1", text: "Priorité à la sécurité et valorisation long terme", correct: "pool-patrimonial" },
      { id: "d2", text: "Achète en brut, cherche à maximiser le taux de rendement", correct: "pool-rendement" },
      { id: "d3", text: "Accepte un risque locatif plus élevé", correct: "pool-rendement" },
      { id: "d4", text: "Recherche un revenu régulier et prévisible", correct: "pool-patrimonial" }
    ],
    feedback: {
      ok: "Excellent ! Vous maîtrisez les deux profils investisseurs.",
      ko: "Profil rendement : achat brut, risque accepté, objectif taux élevé. Profil patrimonial sécurisé : revenu régulier, sécurité prioritaire, valorisation long terme."
    }
  },

  // Q9 — QCM — Logique investisseur
  {
    id: 9,
    type: "qcm",
    text: "Quelle est la logique principale d'un prospect INVESTISSEUR pour un local commercial ?",
    sub: "",
    options: [
      "Maîtrise de ses charges d'exploitation",
      "Proximité de son domicile",
      "Implantation stratégique pour son commerce",
      "Rendement locatif et valorisation patrimoniale"
    ],
    correct: 3,
    feedback: {
      ok: "Correct ! L'investisseur raisonne avant tout en rendement et valorisation patrimoniale.",
      ko: "L'investisseur cherche le rendement locatif (loyer/prix d'achat) et la valorisation à terme. La maîtrise des charges et l'implantation stratégique sont des logiques d'exploitant."
    }
  },

  // Q10 — QCM — Logique exploitant
  {
    id: 10,
    type: "qcm",
    text: "Quelle est la logique principale d'un prospect EXPLOITANT qui achète son local ?",
    sub: "",
    options: [
      "Maîtrise des charges + implantation stratégique pour son activité",
      "Diversification patrimoniale uniquement",
      "Rendement locatif maximal",
      "Revente rapide à plus-value"
    ],
    correct: 0,
    feedback: {
      ok: "Exact ! L'exploitant achète pour maîtriser son coût d'occupation et sécuriser son emplacement.",
      ko: "Un exploitant qui achète son local a 2 motivations : éviter un loyer commercial (maîtrise des charges) et sécuriser son emplacement stratégique. Le rendement et la revente sont des logiques d'investisseur."
    }
  }
];

// =====================
// INIT
// =====================
function startQuiz() {
  prenom = document.getElementById('inp-prenom').value.trim();
  nom = document.getElementById('inp-nom').value.trim();
  if (!prenom || !nom) { alert("Merci de renseigner votre prénom et nom."); return; }
  document.getElementById('screen-identity').classList.remove('active');
  document.getElementById('screen-quiz').classList.add('active');
  document.getElementById('score-live').style.display = 'inline-block';
  currentQ = 0; scoreCorrect = 0; scoreTotal = 0; participantAnswers = {};
  renderQuestion();
}

function updateProgress() {
  const pct = (currentQ / questions.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
}

// =====================
// RENDER
// =====================
function renderQuestion() {
  updateProgress();
  const q = questions[currentQ];
  document.getElementById('q-counter').textContent = `Question ${currentQ + 1} / ${questions.length}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-sub').textContent = q.sub || '';
  document.getElementById('feedback-box').className = 'feedback-box';
  document.getElementById('feedback-box').innerHTML = '';
  document.getElementById('btn-next').className = 'btn-next';
  document.getElementById('btn-validate').disabled = true;

  const multiInfo = document.getElementById('multi-info');
  multiInfo.style.display = 'none';

  const area = document.getElementById('options-area');
  area.innerHTML = '';

  if (q.type === 'qcm') {
    renderQCM(q, area, false);
  } else if (q.type === 'qcm-multi' || q.type === 'multi') {
    multiInfo.style.display = 'block';
    multiInfo.textContent = `✦ Sélectionnez exactement ${q.required} réponse${q.required > 1 ? 's' : ''}`;
    renderQCM(q, area, true);
  } else if (q.type === 'drag') {
    renderDrag(q, area);
  }
}

function renderQCM(q, area, multi) {
  const grid = document.createElement('div');
  grid.className = 'options-grid';
  const letters = 'ABCDEFGHIJ';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.dataset.idx = i;
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectOption(btn, q, multi);
    grid.appendChild(btn);
  });
  area.appendChild(grid);
}

let selectedIndices = [];
function selectOption(btn, q, multi) {
  const btns = document.querySelectorAll('.option-btn');
  const idx = parseInt(btn.dataset.idx);
  if (btn.classList.contains('locked')) return;
  if (!multi) {
    btns.forEach(b => b.classList.remove('selected'));
    selectedIndices = [idx];
    btn.classList.add('selected');
    document.getElementById('btn-validate').disabled = false;
  } else {
    if (btn.classList.contains('selected')) {
      btn.classList.remove('selected');
      selectedIndices = selectedIndices.filter(x => x !== idx);
    } else {
      if (selectedIndices.length < q.required) {
        btn.classList.add('selected');
        selectedIndices.push(idx);
      }
    }
    document.getElementById('btn-validate').disabled = (selectedIndices.length !== q.required);
  }
}

// Drag & Drop state
let dragItems_state = {};
function renderDrag(q, area) {
  const cont = document.createElement('div');
  cont.className = 'drag-container';

  // Pool non assigné
  const sourcePool = document.createElement('div');
  sourcePool.className = 'drag-pool';
  sourcePool.id = 'pool-source';
  sourcePool.innerHTML = `<div class="drag-pool-title">À classer</div>`;

  q.items.forEach(item => {
    const el = document.createElement('div');
    el.className = 'drag-item';
    el.draggable = true;
    el.id = item.id;
    el.textContent = item.text;
    el.addEventListener('dragstart', onDragStart);
    sourcePool.appendChild(el);
    dragItems_state[item.id] = 'pool-source';
  });

  cont.appendChild(sourcePool);

  const targetsWrap = document.createElement('div');
  targetsWrap.style.display = 'flex';
  targetsWrap.style.flexDirection = 'column';
  targetsWrap.style.gap = '12px';

  q.pools.forEach(pool => {
    const p = document.createElement('div');
    p.className = 'drag-pool';
    p.id = pool.id;
    p.innerHTML = `<div class="drag-pool-title">${pool.label}</div>`;
    p.addEventListener('dragover', e => { e.preventDefault(); p.classList.add('drag-over'); });
    p.addEventListener('dragleave', () => p.classList.remove('drag-over'));
    p.addEventListener('drop', e => { e.preventDefault(); p.classList.remove('drag-over'); dropItem(e, pool.id, q); });
    targetsWrap.appendChild(p);
  });

  // Source also droppable
  sourcePool.addEventListener('dragover', e => { e.preventDefault(); sourcePool.classList.add('drag-over'); });
  sourcePool.addEventListener('dragleave', () => sourcePool.classList.remove('drag-over'));
  sourcePool.addEventListener('drop', e => { e.preventDefault(); sourcePool.classList.remove('drag-over'); dropItem(e, 'pool-source', q); });

  cont.appendChild(targetsWrap);
  area.appendChild(cont);

  document.getElementById('btn-validate').disabled = false;
}

let draggedId = null;
function onDragStart(e) { draggedId = e.target.id; e.target.classList.add('dragging'); }

function dropItem(e, poolId, q) {
  if (!draggedId) return;
  const el = document.getElementById(draggedId);
  if (el) {
    el.classList.remove('dragging');
    document.getElementById(poolId).appendChild(el);
    dragItems_state[draggedId] = poolId;
  }
  draggedId = null;
  // Check if all placed
  const allPlaced = q.items.every(item => dragItems_state[item.id] !== 'pool-source');
  document.getElementById('btn-validate').disabled = !allPlaced;
}

// =====================
// VALIDATE
// =====================
function validate() {
  const q = questions[currentQ];
  let isCorrect = false;
  let userAnswer = '';

  if (q.type === 'qcm') {
    scoreTotal++;
    const correct = q.correct;
    const selected = selectedIndices[0];
    isCorrect = (selected === correct);
    userAnswer = q.options[selected] || '';
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => {
      b.classList.add('locked');
      const i = parseInt(b.dataset.idx);
      if (i === correct) b.classList.add('correct');
      else if (i === selected && !isCorrect) b.classList.add('wrong');
    });
    if (isCorrect) scoreCorrect++;
    selectedIndices = [];

  } else if (q.type === 'multi' || q.type === 'qcm-multi') {
    scoreTotal++;
    const sorted = [...selectedIndices].sort();
    const correctSorted = [...q.correct].sort();
    isCorrect = JSON.stringify(sorted) === JSON.stringify(correctSorted);
    userAnswer = selectedIndices.map(i => q.options[i]).join(', ');
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => {
      b.classList.add('locked');
      const i = parseInt(b.dataset.idx);
      if (q.correct.includes(i)) b.classList.add('correct');
      else if (selectedIndices.includes(i)) b.classList.add('wrong');
    });
    if (isCorrect) scoreCorrect++;
    selectedIndices = [];

  } else if (q.type === 'drag') {
    scoreTotal++;
    isCorrect = q.items.every(item => dragItems_state[item.id] === item.correct);
    userAnswer = q.items.map(item => `${item.text} → ${dragItems_state[item.id]}`).join(' | ');
    // Color pools
    q.pools.forEach(pool => {
      const p = document.getElementById(pool.id);
      const allOk = q.items.filter(i => i.correct === pool.id).every(i => dragItems_state[i.id] === pool.id);
      p.classList.add(allOk ? 'correct-pool' : 'wrong-pool');
    });
    document.querySelectorAll('.drag-item').forEach(el => el.draggable = false);
    if (isCorrect) scoreCorrect++;
  }

  participantAnswers[q.id] = { question: q.text, answer: userAnswer, correct: isCorrect, type: q.type };

  // Feedback
  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box show' + (isCorrect ? '' : ' error');
  fb.innerHTML = `<div class="feedback-title">${isCorrect ? '✓ Bonne réponse !' : '✗ Pas tout à fait…'}</div>${isCorrect ? q.feedback.ok : q.feedback.ko}`;

  // Score live
  updateScoreLive();

  document.getElementById('btn-validate').disabled = true;
  document.getElementById('btn-next').className = 'btn-next show';
}

function updateScoreLive() {
  document.getElementById('score-live').textContent = `${scoreCorrect} / ${scoreTotal}`;
}

// =====================
// NEXT
// =====================
function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

// =====================
// RESULTS
// =====================
function showResults() {
  updateProgress();
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('screen-quiz').classList.remove('active');
  document.getElementById('screen-results').classList.add('active');

  const pct = Math.round((scoreCorrect / scoreTotal) * 100);
  document.getElementById('res-name').textContent = `${prenom} ${nom}`;
  document.getElementById('res-correct').textContent = scoreCorrect;
  document.getElementById('res-total').textContent = scoreTotal;
  document.getElementById('res-pct').textContent = pct + '%';
  document.getElementById('ring-pct').textContent = pct + '%';

  const circumference = 427;
  const offset = circumference - (pct / 100) * circumference;
  setTimeout(() => { document.getElementById('ring-circle').style.strokeDashoffset = offset; }, 200);

  let msg = '';
  if (pct >= 80) msg = "Excellent ! Vous maîtrisez les fondamentaux de la vente de locaux commerciaux. 🏆";
  else if (pct >= 60) msg = "Bien joué ! Quelques points à consolider mais vous êtes sur la bonne voie.";
  else msg = "La formation vous aidera à renforcer vos connaissances. N'hésitez pas à relire les slides clés.";
  document.getElementById('res-message').textContent = msg;

  // Review
  const rl = document.getElementById('review-list');
  rl.innerHTML = '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;margin-bottom:16px;letter-spacing:1px;">Récapitulatif</div>';
  Object.values(participantAnswers).forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'review-item';
    div.innerHTML = `<div class="r-q">Q${i+1} — ${a.question}</div>
      <div class="r-answer ${a.correct ? 'ok' : 'ko'}">${a.correct ? '✓ Correct' : '✗ Incorrect'}</div>
      <div class="r-correct">${a.answer.substring(0, 120)}${a.answer.length > 120 ? '…' : ''}</div>`;
    rl.appendChild(div);
  });

  sendResults(pct);
}

// =====================
// SEND
// =====================
async function sendResults(pct) {
  const statusEl = document.getElementById('send-status');
  const reponsesDetail = Object.values(participantAnswers).map((a, i) => ({
    numero: i + 1,
    type: a.type,
    question: a.question,
    reponse: a.answer,
    correct: a.correct ? "Oui" : "Non"
  }));

  const payload = {
    prenom, nom,
    score: scoreCorrect,
    total: scoreTotal,
    pourcentage: pct + "%",
    date: new Date().toLocaleString('fr-FR'),
    reponses: reponsesDetail
  };

  try {
    await fetch(WEBHOOK, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    statusEl.className = 'send-status ok';
    statusEl.textContent = '✓ Résultats envoyés dans Google Sheets';
  } catch (e) {
    statusEl.className = 'send-status err';
    statusEl.textContent = '✗ Erreur d\'envoi — vérifiez la connexion';
  }
}
</script>
